<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>테이블인 서비스 분석</title>
<style>
/* ============================================================
   COLOR TOKENS — 인크로스 Deck Design System
   ============================================================ */
:root {
  --color-primary-50:  #EEF3FF;
  --color-primary-100: #D9E4FF;
  --color-primary-300: #7FA0F5;
  --color-primary-500: #1A54EB;
  --color-primary-600: #1544C4;
  --color-primary-700: #0F349B;

  --color-white:  #FFFFFF;
  --color-gray-50:  #F7F9FC;
  --color-gray-100: #EEF1F6;
  --color-gray-200: #E2E7EF;
  --color-gray-300: #D3DAE4;
  --color-gray-400: #B7C2D6;
  --color-gray-500: #8992A3;
  --color-gray-600: #4A5262;
  --color-gray-900: #0A0B0D;

  --color-success-500: #0A8A4A;
  --color-success-700: #0A7A42;
  --color-success-bg:  #E4F5EC;
  --color-warning-500: #C77700;
  --color-warning-700: #9A5B00;
  --color-warning-bg:  #FBF0DD;
  --color-error-500:   #D42D2D;
  --color-error-700:   #B21F1F;
  --color-error-bg:    #FBE4E4;
  --color-info-500:    #1A54EB;
  --color-info-bg:     #EAF0FF;

  --color-bg:            var(--color-white);
  --color-surface:       var(--color-gray-50);
  --color-sunken:        var(--color-gray-100);
  --color-border-subtle: var(--color-gray-100);
  --color-border:        var(--color-gray-200);
  --color-border-strong: var(--color-gray-300);
  --color-fg-1:          var(--color-gray-900);
  --color-fg-2:          var(--color-gray-600);
  --color-fg-3:          var(--color-gray-500);
  --color-accent:        var(--color-primary-500);
  --color-accent-hover:  var(--color-primary-600);
  --color-accent-press:  var(--color-primary-700);
  --color-on-accent:     #FFFFFF;

  /* Light default has no dark glow; keep a solid fallback for [data-theme=dark] blocks */
  --gradient-dark: radial-gradient(150% 120% at 100% 0%, rgba(108,146,255,0.34) 0%, rgba(100,140,255,0.15) 38%, rgba(94,140,255,0.04) 66%, rgba(94,140,255,0) 86%), #1F252F;
}

[data-theme="dark"] {
  --color-primary-300: #88A6FF;
  --color-primary-500: #4B7BFF;
  --color-primary-600: #6E93FF;

  --color-success-500: #2CC97E;
  --color-success-bg:  rgba(44,201,126,0.15);
  --color-warning-500: #F5A623;
  --color-warning-bg:  rgba(245,166,35,0.15);
  --color-error-500:   #FF5C5C;
  --color-error-bg:    rgba(255,92,92,0.15);
  --color-info-500:    #4B7BFF;
  --color-info-bg:     rgba(75,123,255,0.18);

  --color-bg:            #1F252F;
  --color-surface:       #29303B;
  --color-sunken:        #333B47;
  --color-border-subtle: #333B47;
  --color-border:        #414A57;
  --color-border-strong: #55606F;
  --color-fg-1:          #FFFFFF;
  --color-fg-2:          #A9B1BF;
  --color-fg-3:          #6E7683;
  --color-accent:        var(--color-primary-500);
  --color-accent-hover:  var(--color-primary-600);
  --color-accent-press:  var(--color-primary-300);
  --color-on-accent:     #FFFFFF;

  --gradient-dark: radial-gradient(150% 120% at 100% 0%, rgba(108,146,255,0.34) 0%, rgba(100,140,255,0.15) 38%, rgba(94,140,255,0.04) 66%, rgba(94,140,255,0) 86%), #1F252F;
}

/* ============================================================
   TYPOGRAPHY TOKENS
   ============================================================ */
@font-face {
  font-family: 'Pretendard Variable';
  font-weight: 45 920;
  font-style: normal;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/woff2/PretendardVariable.woff2') format('woff2-variations');
}
:root {
  --font-sans: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  --font-mono: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  --font-numeric-feature: 'tnum' 1, 'lnum' 1;

  --font-size-display: 46px;
  --font-size-h1:      34px;
  --font-size-h2:      26px;
  --font-size-h3:      20px;
  --font-size-body:    16px;
  --font-size-sm:      14px;
  --font-size-caption: 13px;
  --font-size-micro:   11px;

  --font-weight-regular:  400;
  --font-weight-medium:   500;
  --font-weight-semibold: 600;
  --font-weight-bold:     700;
  --font-weight-heavy:    800;

  --line-tight:   1.12;
  --line-heading: 1.25;
  --line-body:    1.55;

  --tracking-display: -0.03em;
  --tracking-heading: -0.02em;
  --tracking-body:     0;
  --tracking-eyebrow:  0.12em;
}

/* ============================================================
   SPACING · RADIUS · ELEVATION
   ============================================================ */
:root {
  --space-1: 4px;  --space-2: 8px;  --space-3: 12px; --space-4: 16px;
  --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px; --space-14: 56px;

  --radius-sm: 7px; --radius-md: 10px; --radius-lg: 14px; --radius-xl: 18px; --radius-full: 999px;

  --shadow-sm:   0 1px 4px rgba(10,11,13,0.06);
  --shadow-card: 0 1px 3px rgba(10,11,13,0.08);
  --shadow-menu: 0 8px 24px rgba(10,11,13,0.12);

  --ease-standard: cubic-bezier(0.2, 0, 0, 1);
  --duration-fast: 120ms; --duration-base: 180ms; --duration-slow: 260ms;
}

/* ============================================================
   BASE
   ============================================================ */
*{box-sizing:border-box}
html,body{margin:0;padding:0;overflow-x:hidden}
header{overflow:hidden}
body{
  background:var(--color-gray-50);
  color:var(--color-fg-1);
  font-family:var(--font-sans);
  font-feature-settings:'tnum' 1,'lnum' 1;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
a{color:var(--color-accent);text-decoration:none}
a:hover{color:var(--color-accent-hover)}
::selection{background:var(--color-primary-100)}

/* nav buttons */
.nav-btn{
  appearance:none;border:none;background:none;cursor:pointer;font-family:inherit;
  font-size:14px;padding:8px 14px 9px;border-radius:10px;
  transition:color 120ms,background 120ms;color:var(--color-fg-2);font-weight:500;
}
.nav-btn:hover{color:var(--color-fg-1)}
.nav-btn.active{color:var(--color-fg-1);font-weight:600;background:var(--color-sunken)}

/* badge (design-system Badge primitive) */
.badge{
  display:inline-flex;align-items:center;font-size:11px;font-weight:700;
  letter-spacing:0.04em;padding:4px 11px;border-radius:999px;line-height:1;white-space:nowrap;
}
.badge.warning{background:var(--color-warning-bg);color:var(--color-warning-700)}
.badge.info{background:var(--color-info-bg);color:var(--color-primary-700)}
.badge.neutral{background:var(--color-sunken);color:var(--color-fg-2)}

/* image placeholder slot (stands in for screen captures) */
.imgslot{
  width:100%;height:100%;border-radius:10px;
  border:1px dashed var(--color-border-strong);
  background:
    linear-gradient(var(--color-surface),var(--color-surface)) padding-box,
    repeating-linear-gradient(45deg, rgba(137,146,163,0.05) 0 12px, rgba(137,146,163,0.11) 12px 24px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  text-align:center;color:var(--color-fg-3);padding:24px;
}
.imgslot svg{opacity:0.5}
.imgslot span{font-size:13px;line-height:1.5;max-width:420px;font-weight:500}

[data-reveal]{will-change:opacity,transform}

/* horizontal-scroll wrapper for the wide "at a glance" table on small screens */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ---- Responsive (mobile-first overrides of the inline layout) ----
   Inline styles are overridden here with !important; attribute-substring
   selectors target the exact inline layouts used in the JS templates. */
@media (max-width:760px){
  header{padding-left:16px !important;padding-right:16px !important}
  header nav{gap:2px !important}
  .nav-btn{padding:8px 10px 9px;font-size:13px}

  /* page gutters */
  [style*="max-width:1080px"]{padding-left:20px !important;padding-right:20px !important}

  /* stack the multi-column card grids */
  [style*="grid-template-columns:repeat(3,1fr)"]{grid-template-columns:1fr !important}
  [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important}
  [style*="grid-template-columns:1fr 1.7fr"]{grid-template-columns:1fr !important}
  [style*="grid-template-columns:140px 1fr"]{grid-template-columns:1fr !important;gap:14px !important}

  /* tighten the journey timeline gutter + drop the summary indent */
  [style*="grid-template-columns:68px 1fr"]{grid-template-columns:44px 1fr !important}
  [style*="margin-left:68px"]{margin-left:0 !important}

  /* let priority rows wrap instead of overflowing */
  [style*="align-items:baseline"]{flex-wrap:wrap}

  /* hero headline sizes */
  [style*="font-size:56px"]{font-size:34px !important}
  [style*="font-size:44px"]{font-size:26px !important}

  /* keep the 4-column "at a glance" table tabular via horizontal scroll */
  .table-scroll .steps-table{min-width:600px}
}

@media (max-width:560px){
  /* free up header space: hide the wordmark divider + doc title, keep logo + tabs */
  .doc-title,.doc-divider{display:none !important}
}
.nav-btn .lbl-short{display:none}
@media (max-width:480px){
  .nav-btn{padding:7px 8px;font-size:12px}
  /* keep all three tabs visible: shorten "User Journey" -> "Journey" */
  .nav-btn .lbl-full{display:none}
  .nav-btn .lbl-short{display:inline}
}
</style>
</head>

/* ============================================================
   SHELL + STATE
   ============================================================ */
var VALID_TABS = { home: 1, journey: 1, insights: 1 };
function tabFromHash(){
  var h = (window.location.hash || '').replace(/^#/, '');
  return VALID_TABS[h] ? h : 'home';
}
var state = { tab: tabFromHash() }; // deep-link: honor #home / #journey / #insights on load
var io = null;

function shell(){
  return ''
  + '<header style="position:fixed;top:0;left:0;right:0;height:60px;background:rgba(255,255,255,0.94);backdrop-filter:saturate(1.4) blur(8px);-webkit-backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--color-border);z-index:30;display:flex;align-items:center;justify-content:space-between;padding:0 32px;">'
    + '<div style="display:flex;align-items:center;gap:16px;">'
      + '<img src="assets/logo-kor.png" alt="인크로스 SK networks" style="height:18px;display:block;">'
      + '<span class="doc-divider" style="width:1px;height:18px;background:var(--color-border);display:inline-block;"></span>'
      + '<span class="doc-title" style="font-size:14px;font-weight:600;color:var(--color-fg-1);letter-spacing:-0.01em;">테이블인 서비스 분석</span>'
    + '</div>'
    + '<nav style="display:flex;align-items:center;gap:4px;">'
      + '<button class="nav-btn' + (state.tab==='home'?' active':'') + '" data-nav="home">Home</button>'
      + '<button class="nav-btn' + (state.tab==='journey'?' active':'') + '" data-nav="journey"><span class="lbl-full">User Journey</span><span class="lbl-short">Journey</span></button>'
      + '<button class="nav-btn' + (state.tab==='insights'?' active':'') + '" data-nav="insights">Insights</button>'
    + '</nav>'
  + '</header>'
  + '<main style="padding-top:60px;">'
    + '<section data-tab="home" style="display:' + (state.tab==='home'?'block':'none') + ';">' + homeSection() + '</section>'
    + '<section data-tab="journey" style="display:' + (state.tab==='journey'?'block':'none') + ';">' + journeySection() + '</section>'
    + '<section data-tab="insights" style="display:' + (state.tab==='insights'?'block':'none') + ';">' + insightsSection() + '</section>'
  + '</main>';
}

/* ---- reveal-on-scroll (mirrors the .dc component) ---- */
function setupReveal(){
  if(!io) return;
  document.querySelectorAll('[data-reveal]').forEach(function(el){
    if(el.dataset.revealDone === '1') return;
    var rect = el.getBoundingClientRect();
    if(rect.width === 0 && rect.height === 0) return; // hidden tab
    el.style.opacity = '0';
    el.style.transform = 'translateY(20px)';
    el.style.transition = 'opacity 260ms cubic-bezier(0.2,0,0,1), transform 260ms cubic-bezier(0.2,0,0,1)';
    io.observe(el);
  });
}

// Update the DOM to reflect the active tab (no rebuild — keeps reveal state)
function applyTab(tab){
  if(!VALID_TABS[tab]) tab = 'home';
  state.tab = tab;
  document.querySelectorAll('[data-tab]').forEach(function(sec){
    sec.style.display = sec.getAttribute('data-tab') === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-btn').forEach(function(btn){
    var active = btn.getAttribute('data-nav') === tab;
    btn.classList.toggle('active', active);
    if(active) btn.setAttribute('aria-current', 'page'); else btn.removeAttribute('aria-current');
  });
  window.scrollTo({ top: 0, behavior: 'auto' });
  requestAnimationFrame(function(){
    document.querySelectorAll('[data-reveal]').forEach(function(el){
      if(el.dataset.revealDone === '1') return;
      if(io) io.unobserve(el);
      var r = el.getBoundingClientRect();
      if(r.width > 0 && r.top < window.innerHeight){
        el.style.opacity = '1';
        el.style.transform = 'none';
        el.dataset.revealDone = '1';
      }
    });
    setupReveal();
  });
}

// Navigate via the URL hash; the hashchange handler performs the DOM update,
// so back/forward and pasted #journey links stay in sync.
function switchTab(tab){
  if(!VALID_TABS[tab]) tab = 'home';
  if(('#' + tab) === window.location.hash){ applyTab(tab); return; }
  window.location.hash = tab;
}

function mount(){
  document.getElementById('app').innerHTML = shell();
  document.addEventListener('click', function(e){
    var t = e.target.closest('[data-nav]');
    if(t){ e.preventDefault(); switchTab(t.getAttribute('data-nav')); }
  });
  io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        var el = e.target;
        el.style.opacity = '1';
        el.style.transform = 'none';
        el.dataset.revealDone = '1';
        io.unobserve(el);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -6% 0px' });
  window.addEventListener('hashchange', function(){ applyTab(tabFromHash()); });
  requestAnimationFrame(setupReveal);
}

mount();
</script>
